crawler:
  max_depth: 3
  max_pages: 100
  same_domain: true
database:
  path: data/scanner.db
dir_scan:
  extensions:
  - .php
  - .html
  - .asp
  - .aspx
  - .jsp
  - .bak
  max_depth: 2
  recursive: false
  threads: 50
  wordlist: data/wordlists/directories.txt
gui:
  colors:
    high_severity: '#f38ba8'
    info_severity: '#a6e3a1'
    low_severity: '#f9e2af'
    medium_severity: '#fab387'
  theme:
    current: flatly
    mode: light
port_scan:
  os_detection: true
  ports: common
  scan_type: tcp
  service_detection: true
  timeout: 2.0
proxy:
  enabled: false
  file: null
  rotate: false
  url: null
report:
  format: html
  include_evidence: true
  output_dir: outputs
scan:
  concurrency: 50
  delay: 0.0
  max_retries: 3
  proxy: null
  timeout: 10
  user_agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36
  verify_ssl: false
subdomain:
  threads: 100
  timeout: 5.0
  wordlist: data/wordlists/subdomains.txt
vuln_scan:
  command_injection: true
  csrf: true
  file_inclusion: true
  sensitive_info: true
  sql_injection: true
  ssrf: true
  xss: true
  xxe: true
web:
  debug: false
  host: 0.0.0.0
  port: 8000
